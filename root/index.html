<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Fire</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div class="container">
        <main>
                <!-- SPLASH SCREEN (Lucy) -->
            <section>


            </section>

            <!--SELECTION SCREEN (Amir)-->
            <section>

                
            </section>

            <!--DETAILS/DESCRIPTION PAGES (Kevin)-->
            <section>

                
            </section>
            
            <!-- DETAILS/BOOKING FORM PAGE (Josh)-->
            <section id="BookingPage">
                <header>
                    <img src="img/paintball gun logo.png" alt="Rapidfire logo" height="70px" width="115px" class="HeadImg">
                    <img src="img/bookingf.png" alt="Booking header" height="70px" width="85px" class="HeadImg">
                </header>
                <form class="booking-form">
                    <label>Name</label>
                    <input type="text" placeholder="Enter your name....">
                  
                    <label>Contact</label>
                    <input type="tel" placeholder="Enter your number....">
                  
                    <label>Emal</label>
                    <input type="email" placeholder="Enter your Email....">
                  
                    <label>Number of players</label>
                    <select>
                      <option selected disabled>Enter your Number of Players....</option>
                      <!--Probaly a less obnoxious way to do this but whatever-->
                      <option>1</option>
                      <option>2</option>
                      <option>3</option>
                      <option>4</option>
                      <option>5</option>
                      <option>6</option>
                      <option>7</option>
                      <option>8</option>
                      <option>9</option>
                      <option>10</option>
                      <option>11</option>
                      <option>12</option>
                      <option>13</option>
                      <option>14</option>
                      <option>15</option>
                    </select>
                  
                    <label>Pick a Date</label>
                    <input type="date">
                  
                    <div class="time-row">
                      <div>
                        <label>Pick Start Time</label>
                        <input type="time">
                      </div>
                  
                      <div>
                        <label>Pick Finish Time</label>
                        <input type="time">
                      </div>
                    </div>
                  
                    <br>
                    <h2>Total : <!--Calculated total goes here--></h2>
                  
                    <button type="submit">BOOK NOW</button>
                  </form>
            </section>

            <!-- CONFIRMATION SCREEN (James)-->
             <section id="booking-success">
                <style>

                    #booking-success {
                        box-sizing: border-box;
                        background-color: #000;
                        font-family: 'Inter', sans-serif;
                        padding: 40px 20px;
                        min-height: 100vh;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                    }

                    #booking-success .success-screen {
                        display: flex;
                        flex-direction: column;
                        text-align: center;
                        width: 100%;
                    }

                    #booking-success h1 {
                        color: orange;
                        margin: 10px 0;
                        line-height: 1.2;
                        font-size: 2.5rem;
                    }

                    #booking-success h3 {
                        color: #fff;
                        margin: 5px 0;
                    }

                    #booking-success .success-logo {
                        display: flex;
                        justify-content: center;
                        margin-bottom: 20px;
                    }

                    #booking-success .success-logo img {
                        max-width: 150px;
                        height: auto;
                    }

                    #booking-success .book-ref {
                        text-align: center;
                        background: #fff;
                        padding: 15px;
                        margin: 25px auto;
                        border: 4px solid orange;
                        width: fit-content;
                        min-width: 200px;
                    }

                    #booking-success .book-ref h3 {
                        background-color: #fff;
                        color: #000;
                        display: inline;
                        margin-right: 5px;
                    }

                    #booking-success #booking-id {
                        font-weight: bold;
                        font-size: 1.2rem;
                        color: orange;
                    }

                    #booking-success #qrcode {
                        margin: 20px auto;
                        padding: 15px;
                        background: #fff;
                        display: inline-block;
                    }

                    #booking-success #qrcode img {
                        display: block;
                    }

                    #booking-success .return-btn {
                        margin-top: 30px;
                    }
                    
                </style>

                
                <div class="success-logo">
                    <img src="img/Paintball gun logo2 1.png" alt="Logo">
                </div>

                <div class="success-screen">
                    <h1>Booking<br>Confirmed!</h1>
                    <h3>Your Game is Activated</h3>

                    <div class="book-ref">
                        <h3>Booking ID:</h3> <span id="booking-id"></span>
                    </div>

                    <div id="qrcode">
                        <!-- QR code inserted here -->
                    </div>

                    <div class="return-btn" id="final-home-btn">
                        <img src="img/backtohome.png" alt="Back to Home">
                    </div>
                </div>
            </section>

        </main>
    </div>

    
   </section>
   <nav>
    <!--Where the Icons go-->
    <div class="nav-item button-1">
        <span>Back</span>
    </div>
    <div class="nav-item button-2">
        <span>Home</span>
    </div>
    <div class="nav-item button-3">
        <span>Selection</span>
    </div>
</nav>

</body>
</html>
