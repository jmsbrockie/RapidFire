<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Fire</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>
    <div class="container">
        <main>
                <!-- SPLASH SCREEN (Lucy) -->
            <section>


            </section>

            <!--SELECTION SCREEN (Amir)-->
            <section>
                <section id="ArenaSelection">

   <header>
    <img src="img/paintball gun logo.png" alt="Rapidfire logo" height="70px" width="115px" class="HeadImg">
    <img src="img/arena-badge" alt="Arenas badge" height="70px" width="85px" class="HeadImg">
</header>

    <div class="arena-list">

        <!-- URBAN ARENA -->
        <div class="arena-card">
            <img src="img/Landscape paintball .png" alt="Urban Arena Image" class="arena-img">

            <div class="arena-info">
                <h2>URBAN</h2>
                <p>Urban-style battlefield with cars & cover points.</p>
                <img src="img/" alt="Select Arena Button" class="select-btn">
            </div>
        </div>

        <!-- FOREST ARENA -->
        <div class="arena-card">
            <img src="img/forrest.jpeg" alt="Forest Arena Image" class="arena-img">

            <div class="arena-info">
                <h2>FOREST</h2>
                <p>Forest arena with trees and barrels.</p>
                <img src="" alt="Select Arena Button" class="select-btn">
            </div>
        </div>

        <!-- INDOOR ARENA -->
        <div class="arena-card">
            <img src="img/resize indoor.png" alt="Indoor Arena Image" class="arena-img">

            <div class="arena-info">
                <h2>INDOOR</h2>
                <p>Indoor arena with graffiti and obstacles.</p>
                <img src="" alt="Select Arena Button" class="select-btn">
            </div>
        </div>

    </div>

</section>


                
            </section>

            <!--DETAILS/DESCRIPTION PAGES (Kevin)-->
            <section>

                
            </section>
            
            <!-- DETAILS/BOOKING FORM PAGE (Josh)-->
            <section id="BookingPage">
                <header>
                    <img src="img/paintball gun logo.png" alt="Rapidfire logo" height="70px" width="115px" class="HeadImg">
                    <img src="img/bookingf.png" alt="Booking header" height="70px" width="85px" class="HeadImg">
                </header>
                <form class="booking-form">
                    <label>Name</label>
                    <input type="text" placeholder="Enter your name....">
                  
                    <label>Contact</label>
                    <input type="tel" placeholder="Enter your number....">
                  
                    <label>Emal</label>
                    <input type="email" placeholder="Enter your Email....">
                  
                    <label>Number of players</label>
                    <select>
                      <option selected disabled>Enter your Number of Players....</option>
                      <!--Probaly a less obnoxious way to do this but whatever-->
                      <option>1</option>
                      <option>2</option>
                      <option>3</option>
                      <option>4</option>
                      <option>5</option>
                      <option>6</option>
                      <option>7</option>
                      <option>8</option>
                      <option>9</option>
                      <option>10</option>
                      <option>11</option>
                      <option>12</option>
                      <option>13</option>
                      <option>14</option>
                      <option>15</option>
                    </select>
                  
                    <label>Pick a Date</label>
                    <input type="date">
                  
                    <div class="time-row">
                      <div>
                        <label>Pick Start Time</label>
                        <input type="time">
                      </div>
                  
                      <div>
                        <label>Pick Finish Time</label>
                        <input type="time">
                      </div>
                    </div>
                  
                    <br>
                    <h2>Total : £70</h2>
                  
                    <button type="button" class="BookNow">BOOK NOW</button>
                  </form>
            </section>

            <!-- CONFIRMATION SCREEN (James)-->
             <section id="booking-success">
 
                <div class="success-logo">
                    <img src="img/Paintball gun logo2 1.png" alt="Logo">
                </div>

                <div class="success-screen">
                    <h1>Booking<br>Confirmed!</h1>
                    <h3>Your Game is Activated</h3>

                    <div class="book-ref">
                        <h3>Booking ID:</h3> <span id="booking-id"></span>
                    </div>

                    <div id="qrcode">
                        <!-- QR code inserted here -->
                    </div>

                    <div class="return-btn" id="final-home-btn">
                        <img src="img/backtohome.png" alt="Back to Home">
                    </div>
                </div>
            </section>

        </main>
    </div>

    
   <nav>
    <!--Where the Icons go-->
    <div class="nav-item button-1">
        <img src="img/arrow-left 1.png" alt="Back arrow" height="50px" width="50px">
    </div>
    <div class="nav-item button-2">
        <img src="img/home icon.png" alt="Home buttton" height="50px" width="50px">
    </div>
    <div class="nav-item button-3">
        <img src="img/selection icon.png" alt="Selection button" height="50px" width="50px">
    </div>
</nav>

</body>
</html>
